    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- FontAwesome-->

    <!-- Tailwind Config for Premium Colors -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            1: '#D6D4C9', // Soft Secret
                            2: '#9D9F97', // Wet Pavement
                            3: '#697F93', // Blue Prince
                            4: '#415365', // Into the Stratosphere
                            5: '#2c4057'  // Black Pearl
                        }
                    },
                    boxShadow: {
                        'premium': '0 4px 6px -1px rgba(30, 38, 47, 0.05), 0 2px 4px -1px rgba(30, 38, 47, 0.03)',
                        'premium-hover': '0 10px 15px -3px rgba(30, 38, 47, 0.08), 0 4px 6px -2px rgba(30, 38, 47, 0.04)',
                        'dropdown': '0 20px 25px -5px rgba(30, 38, 47, 0.15), 0 8px 10px -6px rgba(30, 38, 47, 0.1)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #EFEFEA;
            color: #415365;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(157, 159, 151, 0.4);
            border-radius: 8px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(105, 127, 147, 0.8);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .card-panel {
            background: #FFFFFF;
            border: 1px solid rgba(157, 159, 151, 0.2);
            box-shadow: 0 4px 6px -1px rgba(30, 38, 47, 0.05), 0 2px 4px -1px rgba(30, 38, 47, 0.03);
            border-radius: 1rem;
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .calendar-cell-anim {
            animation: scaleIn 0.2s ease-out forwards;
        }

        .pulse-cloud {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }

        /* 🌙 深色模式 (Dark Mode) 高級覆寫規則 */
        html.dark {
            background-color: #151B21;
        }

        .dark body {
            background-color: #151B21;
            color: #D6D4C9;
        }

        .dark .card-panel,
        .dark .bg-white {
            background-color: #1E262F !important;
            border-color: #415365 !important;
        }

        .dark .text-brand-5 {
            color: #EFEFEA !important;
        }

        .dark .text-brand-4 {
            color: #D6D4C9 !important;
        }

        .dark .text-brand-2 {
            color: #9D9F97 !important;
        }

        .dark .bg-\[\#FAF7F2\] {
            background-color: #2C363F !important;
            border-color: #415365 !important;
        }

        .dark .bg-brand-1\/20,
        .dark .bg-brand-1\/30,
        .dark .bg-brand-1\/10,
        .dark .bg-brand-1\/40 {
            background-color: rgba(255, 255, 255, 0.05) !important;
        }

        .dark input,
        .dark select {
            background-color: #151B21 !important;
            color: #EFEFEA !important;
            border-color: #415365 !important;
        }

        .dark nav.bg-white {
            background-color: #1E262F !important;
            border-top-color: #415365 !important;
        }

        .dark header.bg-white {
            background-color: #1E262F !important;
            border-bottom-color: #415365 !important;
        }

        .dark .text-\[\#A56B5D\] {
            color: #E8A598 !important;
        }

        .dark .bg-\[\#FDF3F3\] {
            background-color: rgba(232, 165, 152, 0.1) !important;
            border-color: rgba(232, 165, 152, 0.3) !important;
        }
    </style>
</head>

<body>
    <div id="root" class="w-full h-[100dvh]"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // ==========================================
        // 💡 雲端資料庫設定區 (GitHub Pages 用戶請填這裡)
        // ==========================================
        const USER_FIREBASE_CONFIG = {
            // 請將你在 Firebase 申請的 config 貼在這邊的引號內
            // 如果保持 "YOUR_API_KEY"，系統會自動切換為「本地單機模式」，資料不會遺失！
            apiKey: "AIzaSyCggdg-eIOKAPt95TiE3jI4Q_Ae_bUjKEo",
           authDomain: "icememory-6ad56.firebaseapp.com",
           projectId: "icememory-6ad56",
           storageBucket: "icememory-6ad56.firebasestorage.app",
           messagingSenderId: "496500713930",
           appId: "1:496500713930:web:ae75be464177b1bbb50733"
        };

        // 判斷是否為雲端模式 (根據有無填入真實 Key 或是否在 Canvas 預覽環境)
        const isCloudMode = typeof __firebase_config !== 'undefined' || USER_FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";
        const activeAppId = typeof __app_id !== 'undefined' ? __app_id : 'icememory-github-pages';

        // ==========================================
        // 常數與預設資料
        // ==========================================
        const DEFAULT_CATEGORIES = [
            { id: 'rice', icon: 'fa-solid fa-bowl-rice', name: '飯類' },
            { id: 'noodle', icon: 'fa-solid fa-bowl-food', name: '麵類' },
            { id: 'fastfood', icon: 'fa-solid fa-burger', name: '速食/炸物' },
            { id: 'healthy', icon: 'fa-solid fa-seedling', name: '健康/輕食' },
            { id: 'tea', icon: 'fa-solid fa-leaf', name: '純茶' },
            { id: 'milktea', icon: 'fa-solid fa-glass-water', name: '奶茶' },
            { id: 'addon', icon: 'fa-solid fa-mug-hot', name: '加料飲品', isAddon: true },
            { id: 'coffee', icon: 'fa-solid fa-mug-saucer', name: '咖啡' },
            { id: 'dumpling', icon: 'fa-solid fa-utensils', name: '水餃' },
            { id: 'other', icon: 'fa-solid fa-box-open', name: '其他/點心' },
        ];
        const DRINK_CATEGORIES = ['tea', 'milktea', 'addon', 'coffee'];
        const SUGAR_OPTIONS = ['正常', '少糖(7)', '半糖(5)', '微糖(3)', '一分', '無糖'];
        const ICE_OPTIONS = ['正常冰', '少冰', '微冰', '去冰', '完全去冰', '常溫', '溫', '熱'];
        const CHART_COLORS = ['#7C98B3', '#D6B5A7', '#8EA495', '#CFB997', '#A8929E', '#9CB1C9', '#C2B8B1', '#A3B4A9', '#C9A3A3', '#9AADB9'];

        const DEFAULT_SETTINGS = {
            budget: 5000,
            budgetType: 'monthly', // daily, weekly, monthly
            goalEnabled: true,
            goalCategory: 'addon', // 對應 categoryId
            goalPeriod: 'weekly',  // weekly, monthly
            goalLimit: 2,
            avgCalcMethod: 'workdays', // workdays, alldays
        };

        // 共通小元件：紀錄顯示 (含糖冰)
        function RecordDisplayName({ record }) {
            return (
                <div className="flex flex-col sm:flex-row sm:items-center gap-0.5 sm:gap-2">
                    <p className="font-semibold text-brand-5 text-sm">{record.name}</p>
                    {record.sugar && record.ice && (
                        <span className="text-[10px] text-brand-3 bg-brand-3/10 px-1.5 py-0.5 rounded font-medium inline-block w-fit">
                            {record.sugar} / {record.ice}
                        </span>
                    )}
                </div>
            )
        }

        // --- Chart.js 元件 ---
        function PieChart({ catStats, categories }) {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = canvasRef.current.getContext('2d');
                const sortedEntries = Object.entries(catStats).sort((a, b) => b[1] - a[1]);
                const labels = sortedEntries.map(([id]) => categories.find(c => c.id === id)?.name || id);
                const data = sortedEntries.map(([id, val]) => val);

                chartInstance.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels,
                        datasets: [{ data, backgroundColor: CHART_COLORS.slice(0, data.length), borderWidth: 0, hoverOffset: 4 }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false, cutout: '70%',
                        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#2c4057', titleColor: '#D6D4C9', bodyColor: '#ffffff', padding: 12, cornerRadius: 8 } }
                    }
                });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [catStats, categories]);

            return <div className="w-full h-48 relative"><canvas ref={canvasRef}></canvas></div>;
        }

        function TrendBarChart({ records, scale }) {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = canvasRef.current.getContext('2d');

                let labels = []; let data = [];
                if (scale === 'yearly') {
                    labels = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
                    const monthData = new Array(12).fill(0);
                    records.forEach(r => monthData[new Date(r.date).getMonth()] += r.price);
                    data = monthData;
                } else {
                    const groups = {};
                    records.forEach(r => {
                        const d = new Date(r.date);
                        const key = `${d.getFullYear()}/${d.getMonth() + 1}`;
                        groups[key] = (groups[key] || 0) + r.price;
                    });
                    labels = Object.keys(groups).sort();
                    data = labels.map(l => groups[l]);
                }

                chartInstance.current = new Chart(ctx, {
                    type: 'bar',
                    data: { labels, datasets: [{ data, backgroundColor: '#697F93', borderRadius: 4, barPercentage: 0.6 }] },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#2c4057', titleColor: '#D6D4C9', bodyColor: '#ffffff', padding: 12, cornerRadius: 8 } },
                        scales: { y: { beginAtZero: true, grid: { color: 'rgba(157, 159, 151, 0.15)' }, border: { display: false }, ticks: { font: { size: 10 } } }, x: { grid: { display: false }, border: { display: false }, ticks: { font: { size: 10 } } } }
                    }
                });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [records, scale]);

            return <div className="w-full h-48 mt-6 border-t border-brand-1/50 pt-6 relative"><canvas ref={canvasRef}></canvas></div>;
        }

        function MonthNavigator({ viewMonth, onPrev, onNext }) {
            const year = viewMonth.getFullYear();
            const month = viewMonth.getMonth() + 1;
            return (
                <div className="flex items-center justify-between card-panel px-4 py-3 mb-6 w-full max-w-sm mx-auto md:mx-0">
                    <button onClick={onPrev} className="w-8 h-8 rounded-lg text-brand-4 hover:bg-brand-1/50 transition-colors flex items-center justify-center active:scale-95"><i className="fa-solid fa-chevron-left text-sm"></i></button>
                    <span className="font-bold text-brand-5 text-base flex items-center gap-2"><i className="fa-regular fa-calendar text-brand-3"></i> {year} 年 {month} 月</span>
                    <button onClick={onNext} className="w-8 h-8 rounded-lg text-brand-4 hover:bg-brand-1/50 transition-colors flex items-center justify-center active:scale-95"><i className="fa-solid fa-chevron-right text-sm"></i></button>
                </div>
            )
        }

        // --- 編輯紀錄 Modal ---
        function EditModal({ record, onClose, onSave, categories }) {
            const [name, setName] = useState(record.name);
            const [price, setPrice] = useState(record.price);
            const [categoryId, setCategoryId] = useState(record.categoryId);
            const [payer, setPayer] = useState(record.payer || '');
            const [memo, setMemo] = useState(record.memo || '');
            const [rating, setRating] = useState(record.rating || 0);
            const [sugar, setSugar] = useState(record.sugar || '');
            const [ice, setIce] = useState(record.ice || '');
            const isDrink = DRINK_CATEGORIES.includes(categoryId);

            const [recordDate, setRecordDate] = useState(() => {
                const d = new Date(record.date);
                return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!name || !price) return;
                let newTimestamp = record.date;
                const originalDateStr = new Date(new Date(record.date).getTime() - new Date(record.date).getTimezoneOffset() * 60000).toISOString().split('T')[0];
                if (recordDate !== originalDateStr) newTimestamp = new Date(recordDate).getTime() + (12 * 60 * 60 * 1000);

                onSave({
                    ...record, name: name.trim(), price: Number(price), categoryId,
                    payer: payer.trim() || null, isPaid: payer.trim() ? (record.payer === payer.trim() ? record.isPaid : false) : true,
                    memo: memo.trim(), rating, sugar: isDrink ? sugar : '', ice: isDrink ? ice : '', date: newTimestamp
                });
            };

            return (
                <div className="fixed inset-0 bg-brand-5/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="px-6 py-4 border-b border-brand-1/50 flex justify-between items-center bg-[#FAF7F2]">
                            <h3 className="font-bold text-brand-5"><i className="fa-solid fa-pen-to-square mr-2 text-brand-3"></i>編輯紀錄</h3>
                            <button onClick={onClose} className="text-brand-2 hover:text-brand-5 transition-colors"><i className="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
                            <form id="editForm" onSubmit={handleSubmit} className="flex flex-col gap-5">
                                <div>
                                    <label className="block text-xs font-semibold text-brand-4 mb-2">消費日期</label>
                                    <input type="date" value={recordDate} onChange={e => setRecordDate(e.target.value)} required className="w-full bg-white border border-brand-2/40 rounded-xl px-4 py-2.5 text-brand-5 focus:border-brand-3 focus:ring-1 focus:ring-brand-3 outline-none text-sm transition-all cursor-pointer" />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-brand-4 mb-2">分類</label>
                                    <div className="flex flex-wrap gap-2">
                                        {categories.map(cat => (
                                            <button type="button" key={cat.id} onClick={() => setCategoryId(cat.id)}
                                                className={`px-3 py-2 rounded-xl text-xs font-medium transition-all border ${categoryId === cat.id ? 'bg-brand-5 text-white border-brand-5' : 'bg-white text-brand-4 border-brand-2/20 hover:border-brand-3'}`}>
                                                <i className={`${cat.icon} mr-1.5`}></i>{cat.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="flex gap-4">
                                    <div className="flex-1">
                                        <label className="block text-xs font-semibold text-brand-4 mb-2">品項名稱</label>
                                        <input type="text" required value={name} onChange={e => setName(e.target.value)} className="w-full bg-white border border-brand-2/40 rounded-xl px-4 py-2.5 text-brand-5 focus:border-brand-3 focus:ring-1 focus:ring-brand-3 outline-none text-sm transition-all" />
                                    </div>
                                    <div className="w-32 shrink-0">
                                        <label className="block text-xs font-semibold text-brand-4 mb-2">金額</label>
                                        <input type="number" required min="0" value={price} onChange={e => setPrice(e.target.value)} className="w-full bg-white border border-brand-2/40 rounded-xl px-4 py-2.5 text-brand-5 focus:border-brand-3 focus:ring-1 focus:ring-brand-3 outline-none text-sm transition-all font-bold" />
                                    </div>
                                </div>

                                {isDrink && (
                                    <div className="bg-[#FAF7F2] p-4 rounded-xl border border-[#D5C6BA] flex flex-col gap-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-brand-4 mb-2"><i className="fa-solid fa-cubes-stacked mr-1.5 text-brand-3"></i>甜度</label>
                                            <div className="flex flex-wrap gap-2">
                                                {SUGAR_OPTIONS.map(s => (
                                                    <button type="button" key={s} onClick={() => setSugar(s)} className={`px-2.5 py-1.5 rounded-lg text-xs font-medium transition-all border ${sugar === s ? 'bg-brand-3 text-white border-brand-3' : 'bg-white text-brand-4 border-brand-2/30 hover:border-brand-3'}`}>{s}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-brand-4 mb-2"><i className="fa-solid fa-icicles mr-1.5 text-[#697F93]"></i>冰塊</label>
                                            <div className="flex flex-wrap gap-2">
                                                {ICE_OPTIONS.map(i => (
                                                    <button type="button" key={i} onClick={() => setIce(i)} className={`px-2.5 py-1.5 rounded-lg text-xs font-medium transition-all border ${ice === i ? 'bg-[#697F93] text-white border-[#697F93]' : 'bg-white text-brand-4 border-brand-2/30 hover:border-[#697F93]'}`}>{i}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="border-t border-brand-1/50 pt-5 mt-2">
                                    <label className="block text-xs font-semibold text-[#A56B5D] mb-2"><i className="fa-solid fa-user-group mr-1.5"></i>代墊人</label>
                                    <input type="text" value={payer} onChange={e => setPayer(e.target.value)} placeholder="同事名字" className="w-full bg-white border border-brand-2/40 rounded-xl px-4 py-2.5 text-brand-5 focus:border-brand-3 focus:ring-1 focus:ring-brand-3 outline-none text-sm transition-all" />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-brand-4 mb-2">{isDrink ? '配料與評價' : '備註與評價'}</label>
                                    <div className="flex gap-2">
                                        <input type="text" value={memo} onChange={e => setMemo(e.target.value)} placeholder={isDrink ? "例：+白玉波霸" : "例：微糖少冰"} className="flex-1 bg-white border border-brand-2/40 rounded-xl px-4 py-2.5 text-brand-5 focus:border-brand-3 focus:ring-1 focus:ring-brand-3 outline-none text-sm transition-all" />
                                        <button type="button" onClick={() => setRating(rating === 1 ? 0 : 1)} className={`w-11 rounded-xl border transition-all text-sm flex items-center justify-center ${rating === 1 ? 'bg-brand-5 text-white border-brand-5' : 'bg-white text-brand-2 border-brand-2/40 hover:border-brand-3 hover:text-brand-3'}`}><i className="fa-solid fa-thumbs-up"></i></button>
                                        <button type="button" onClick={() => setRating(rating === -1 ? 0 : -1)} className={`w-11 rounded-xl border transition-all text-sm flex items-center justify-center ${rating === -1 ? 'bg-brand-5 text-white border-brand-5' : 'bg-white text-brand-2 border-brand-2/40 hover:border-brand-3 hover:text-brand-3'}`}><i className="fa-solid fa-thumbs-down"></i></button>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <div className="px-6 py-4 border-t border-brand-1/50 flex justify-end gap-3 bg-brand-1/10">
                            <button type="button" onClick={onClose} className="px-5 py-2.5 rounded-xl text-sm font-semibold text-brand-4 hover:bg-brand-2/20 transition-colors">取消</button>
                            <button type="submit" form="editForm" className="px-6 py-2.5 rounded-xl text-sm font-semibold bg-brand-5 text-white hover:bg-brand-4 transition-colors shadow-sm">儲存變更</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 主程式 App (整合雲端與單機雙引擎)
        // ==========================================
        function App() {

            // --- 核心狀態 (支援舊資料無痛搬家) ---
            const [records, setRecords] = useState([]);
            const [settings, setSettings] = useState(() => {
                const stored = window.localStorage.getItem('icememory_settings');
                if (stored) return JSON.parse(stored);

                // 抓取舊版的單獨設定並無縫轉移
                const oldBudget = window.localStorage.getItem('icememory_budget');
                const oldBudgetType = window.localStorage.getItem('icememory_budget_type');
                const oldQuota = window.localStorage.getItem('icememory_quota');

                const migratedSettings = { ...DEFAULT_SETTINGS };
                if (oldBudget !== null) migratedSettings.budget = JSON.parse(oldBudget);
                if (oldBudgetType !== null) migratedSettings.budgetType = JSON.parse(oldBudgetType);
                if (oldQuota !== null) migratedSettings.goalLimit = JSON.parse(oldQuota);

                window.localStorage.setItem('icememory_settings', JSON.stringify(migratedSettings));
                return migratedSettings;
            });
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);

            const [activeTab, setActiveTab] = useState('add');
            const [holidays, setHolidays] = useState({});
            // --- 新增：深淺色主題切換引擎 ---
            useEffect(() => {
                if (settings.theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [settings.theme]);
            // --- 雲端/登入狀態 ---
            const [fbDB, setFbDB] = useState(null);
            const [fbAuth, setFbAuth] = useState(null);
            const [user, setUser] = useState(null);
            const [syncStatus, setSyncStatus] = useState(isCloudMode ? 'connecting' : 'offline'); // connecting, synced, error, offline
            const [showMigrateModal, setShowMigrateModal] = useState(false);
            // --- 新增：新手導覽狀態與邏輯 ---
            const [showTour, setShowTour] = useState(() => !window.localStorage.getItem('icememory_has_seen_tour'));
            const [tourStep, setTourStep] = useState(0);

            const TOUR_STEPS = [
                { title: '歡迎來到 ICEMemory', desc: '極簡、極速的記帳神器。在這裡輸入「品項 空格 金額」，按下 Enter 就能秒速記帳！', icon: 'fa-bolt', color: 'text-yellow-500' },
                { title: '掌握你的小確幸', desc: '透過底部的「總覽」切換，隨時掌握今天花了多少，以及你的「專屬小確幸扣打」還剩幾次！', icon: 'fa-chart-pie', color: 'text-brand-3' },
                { title: '打造專屬記帳本', desc: '去「設定」裡調整預算、自訂分類，還有開啟無縫雲端同步。現在，開始你的記帳旅程吧', icon: 'fa-sliders', color: 'text-brand-4' }
            ];

            const nextTourStep = () => {
                if (tourStep < TOUR_STEPS.length - 1) setTourStep(prev => prev + 1);
                else finishTour();
            };
            const finishTour = () => {
                window.localStorage.setItem('icememory_has_seen_tour', 'true');
                setShowTour(false);
                setTourStep(0);
            };
            // --- 日期狀態 ---
            const [viewMonth, setViewMonth] = useState(() => new Date(new Date().getFullYear(), new Date().getMonth(), 1));
            const handlePrevMonth = () => setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() - 1, 1));
            const handleNextMonth = () => setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 1));

            // --- 載入 Firebase 引擎 ---
            useEffect(() => {
                const initFirebase = async () => {
                    if (!isCloudMode) {
                        // 降級為單機模式：從 LocalStorage 讀取
                        const localRecords = JSON.parse(window.localStorage.getItem('icememory_records') || '[]');
                        const localSettings = JSON.parse(window.localStorage.getItem('icememory_settings') || JSON.stringify(DEFAULT_SETTINGS));
                        const localCategories = JSON.parse(window.localStorage.getItem('icememory_categories') || JSON.stringify(DEFAULT_CATEGORIES));
                        setRecords(localRecords);
                        setSettings(localSettings);
                        setCategories(localCategories);
                        setSyncStatus('offline');
                        return;
                    }

                    try {
                        // 使用 Function 繞過 Babel 對動態 import 的編譯 (防止轉為 require)
                        const _dynamicImport = new Function('modulePath', 'return import(modulePath)');

                        const { initializeApp } = await _dynamicImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                        const { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, signInWithPopup, GoogleAuthProvider, signOut } = await _dynamicImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                        const { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, writeBatch } = await _dynamicImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

                        // 將需要的 Firebase 模組掛載到 window 供後續存取
                        window.FB = { doc, setDoc, deleteDoc, collection, writeBatch, signInWithPopup, GoogleAuthProvider, signOut, onSnapshot };

                        let configToUse = USER_FIREBASE_CONFIG;
                        if (typeof __firebase_config !== 'undefined') configToUse = JSON.parse(__firebase_config);

                        const app = initializeApp(configToUse);
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        setFbDB(db); setFbAuth(auth);

                        // 判斷登入邏輯 (Canvas 預設 Token 或 匿名 / GitHub Pages 依賴真實登入)
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else if (typeof __firebase_config !== 'undefined') {
                            await signInAnonymously(auth); // Canvas 的備用方案
                        }

                        onAuthStateChanged(auth, (currentUser) => {
                            setUser(currentUser);
                            if (currentUser) {
                                // 檢查是否需要搬家 (本地有資料 + 雲端還沒標記搬過)
                                const localRecords = JSON.parse(window.localStorage.getItem('icememory_records') || '[]');
                                if (localRecords.length > 0 && !window.localStorage.getItem('icememory_migrated')) {
                                    setShowMigrateModal(true);
                                }
                            } else {
                                // 若登出，切回預設/本地畫面
                                setRecords([]); setSettings(DEFAULT_SETTINGS); setSyncStatus('offline');
                            }
                        });
                    } catch (error) {
                        console.error("Firebase 初始化失敗，降級單機模式", error);
                        setSyncStatus('error');
                    }
                };
                initFirebase();
            }, []);

            // --- 監聽雲端資料 (Firestore) ---
            useEffect(() => {
                if (!isCloudMode || !user || !fbDB || !window.FB || !window.FB.onSnapshot) return;

                const recordsRef = window.FB.collection(fbDB, 'artifacts', activeAppId, 'users', user.uid, 'records');
                const settingsRef = window.FB.doc(fbDB, 'artifacts', activeAppId, 'users', user.uid, 'settings', 'config');

                setSyncStatus('connecting');

                const unsubRecords = window.FB.onSnapshot(recordsRef, (snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => data.push(doc.data()));
                    setRecords(data);
                    setSyncStatus('synced');
                }, (err) => { console.error(err); setSyncStatus('error'); });

                const unsubSettings = window.FB.onSnapshot(settingsRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.userSettings) setSettings(data.userSettings);
                        if (data.categories) setCategories(data.categories);
                    }
                }, (err) => { console.error(err); });

                return () => { unsubRecords(); unsubSettings(); };
            }, [user, fbDB]);

            // --- 資料異動引擎 (支援雲端與單機) ---
            const updateSettings = useCallback(async (newSettings, newCategories = categories) => {
                setSettings(newSettings); setCategories(newCategories);
                if (isCloudMode && user && fbDB) {
                    const ref = window.FB.doc(fbDB, 'artifacts', activeAppId, 'users', user.uid, 'settings', 'config');
                    await window.FB.setDoc(ref, { userSettings: newSettings, categories: newCategories }, { merge: true });
                } else {
                    window.localStorage.setItem('icememory_settings', JSON.stringify(newSettings));
                    window.localStorage.setItem('icememory_categories', JSON.stringify(newCategories));
                }
            }, [user, fbDB, categories]);

            const addRecord = async (record) => {
                if (isCloudMode && user && fbDB) {
                    const ref = window.FB.doc(fbDB, 'artifacts', activeAppId, 'users', user.uid, 'records', record.id);
                    await window.FB.setDoc(ref, record);
                } else {
                    const newData = [...records, record];
                    setRecords(newData);
                    window.localStorage.setItem('icememory_records', JSON.stringify(newData));
                }
            };

            const updateRecord = async (record) => {
                if (isCloudMode && user && fbDB) {
                    const ref = window.FB.doc(fbDB, 'artifacts', activeAppId, 'users', user.uid, 'records', record.id);
                    await window.FB.setDoc(ref, record);
                } else {
                    const newData = records.map(r => r.id === record.id ? record : r);
                    setRecords(newData);
                    window.localStorage.setItem('icememory_records', JSON.stringify(newData));
                }
            };

            const deleteRecord = async (id) => {
                if (window.confirm('確定要刪除這筆紀錄嗎？')) {
                    if (isCloudMode && user && fbDB) {
                        const ref = window.FB.doc(fbDB, 'artifacts', activeAppId, 'users', user.uid, 'records', id);
                        await window.FB.deleteDoc(ref);
                    } else {
                        const newData = records.filter(r => r.id !== id);
                        setRecords(newData);
                        window.localStorage.setItem('icememory_records', JSON.stringify(newData));
                    }
                }
            };
// --- 雲端批次匯入引擎 (修復匯入無法同步的 Bug) ---
            const importRecords = async (importedData) => {
                if (isCloudMode && user && fbDB) {
                    try {
                        const batch = window.FB.writeBatch(fbDB);
                        importedData.forEach(r => {
                            const ref = window.FB.doc(fbDB, 'artifacts', activeAppId, 'users', user.uid, 'records', r.id);
                            batch.set(ref, r);
                        });
                        await batch.commit();
                        alert('✅ 雲端資料同步匯入成功！請重新整理網頁！');
                    } catch (e) {
                        console.error("匯入失敗", e);
                        alert('❌ 雲端匯入失敗，請檢查網路狀態');
                    }
                } else {
                    setRecords(importedData);
                    window.localStorage.setItem('icememory_records', JSON.stringify(importedData));
                    alert('✅ 單機資料匯入成功！');
                }
            };
            // 一鍵搬家函數
            const performMigration = async () => {
                try {
                    const localRecords = JSON.parse(window.localStorage.getItem('icememory_records') || '[]');
                    if (localRecords.length > 0 && fbDB && user) {
                        const batch = window.FB.writeBatch(fbDB);
                        localRecords.forEach(r => {
                            const ref = window.FB.doc(fbDB, 'artifacts', activeAppId, 'users', user.uid, 'records', r.id);
                            batch.set(ref, r);
                        });
                        await batch.commit();
                        window.localStorage.setItem('icememory_migrated', 'true');
                        window.localStorage.removeItem('icememory_records'); // 搬家後清空本地，避免重複提示
                    }
                    setShowMigrateModal(false);
                } catch (e) {
                    alert('搬家失敗，請確認網路狀態');
                    console.error(e);
                }
            };

            // --- 政府行事曆 API ---
            useEffect(() => {
                const fetchYearHolidays = async (y) => {
                    const cacheKey = `icememory_holidays_${y}`;
                    const cached = localStorage.getItem(cacheKey);
                    if (cached) return JSON.parse(cached);
                    try {
                        const res = await fetch(`https://cdn.jsdelivr.net/gh/ruyut/TaiwanCalendar/data/${y}.json`);
                        if (!res.ok) return {};
                        const data = await res.json();
                        const map = {};
                        data.forEach(d => { map[d.date] = d; });
                        localStorage.setItem(cacheKey, JSON.stringify(map));
                        return map;
                    } catch (e) { return {}; }
                };

                const loadHolidays = async () => {
                    const currentYear = new Date().getFullYear();
                    const viewY = viewMonth.getFullYear();
                    const map1 = await fetchYearHolidays(currentYear);
                    const map2 = currentYear !== viewY ? await fetchYearHolidays(viewY) : {};
                    setHolidays(prev => ({ ...prev, ...map1, ...map2 }));
                };
                loadHolidays();
            }, [viewMonth]);

            // --- 核心計算 ---
            const now = new Date();
            const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const dayOfWeek = now.getDay();
            const diffToMonday = now.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
            const startOfWeek = new Date(now.getFullYear(), now.getMonth(), diffToMonday).getTime();
            const startOfViewMonth = viewMonth.getTime();
            const endOfViewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0, 23, 59, 59, 999).getTime();

            const todayTotal = records.filter(r => r.date >= startOfToday).reduce((sum, r) => sum + Number(r.price), 0);
            const thisWeekRecords = records.filter(r => r.date >= startOfWeek);
            const thisWeekTotal = thisWeekRecords.reduce((sum, r) => sum + Number(r.price), 0);

            const viewMonthRecords = records.filter(r => r.date >= startOfViewMonth && r.date <= endOfViewMonth);
            const viewMonthTotal = viewMonthRecords.reduce((sum, r) => sum + Number(r.price), 0);

            // 動態目標扣打計算
            let goalCurrentVal = 0;
            if (settings.goalEnabled) {
                const targetRecords = settings.goalPeriod === 'weekly' ? thisWeekRecords : (settings.goalPeriod === 'monthly' ? records.filter(r => r.date >= new Date(now.getFullYear(), now.getMonth(), 1).getTime()) : todayTotal);
                goalCurrentVal = targetRecords.filter(r => r.categoryId === settings.goalCategory).length;
            }

            const debts = records.filter(r => r.payer && !r.isPaid);
            const debtsByPerson = debts.reduce((acc, curr) => {
                if (!acc[curr.payer]) acc[curr.payer] = { total: 0, items: [], ids: [] };
                acc[curr.payer].total += Number(curr.price);
                acc[curr.payer].items.push(curr.name);
                acc[curr.payer].ids.push(curr.id);
                return acc;
            }, {});

            const payDebt = async (payerName) => {
                const idsToPay = debtsByPerson[payerName].ids;
                if (isCloudMode && fbDB && user) {
                    const batch = window.FB.writeBatch(fbDB);
                    idsToPay.forEach(id => {
                        const ref = window.FB.doc(fbDB, 'artifacts', activeAppId, 'users', user.uid, 'records', id);
                        batch.update(ref, { isPaid: true });
                    });
                    await batch.commit();
                } else {
                    const newData = records.map(r => idsToPay.includes(r.id) ? { ...r, isPaid: true } : r);
                    setRecords(newData);
                    window.localStorage.setItem('icememory_records', JSON.stringify(newData));
                }
            };

            // 狀態燈號顯示
            const syncIcon = {
                offline: { icon: 'fa-cloud-arrow-down', color: 'text-brand-2', text: '單機模式' },
                connecting: { icon: 'fa-cloud', color: 'text-brand-3 pulse-cloud', text: '同步中...' },
                synced: { icon: 'fa-cloud-check', color: 'text-green-600', text: '已同步雲端' },
                error: { icon: 'fa-cloud-xmark', color: 'text-[#A56B5D]', text: '連線異常' }
            }[syncStatus];

            return (
                <div className="flex h-full w-full">
                    {/* --- 新手導覽 UI 遮罩 --- */}
                    {showTour && (
                        <div className="fixed inset-0 bg-brand-5/80 backdrop-blur-md z-[300] flex items-center justify-center p-6 animate-fade-in">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col transform transition-all scale-100">
                                <div className="p-8 flex flex-col items-center text-center">
                                    <div className="w-16 h-16 rounded-2xl bg-brand-1/30 flex items-center justify-center mb-6 shadow-inner">
                                        <i className={`fa-solid ${TOUR_STEPS[tourStep].icon} text-3xl ${TOUR_STEPS[tourStep].color}`}></i>
                                    </div>
                                    <h3 className="text-xl font-bold text-brand-5 mb-3">{TOUR_STEPS[tourStep].title}</h3>
                                    <p className="text-sm text-brand-4 leading-relaxed">{TOUR_STEPS[tourStep].desc}</p>

                                    {/* 步驟指示器 (Dots) */}
                                    <div className="flex gap-2 mt-8 mb-2">
                                        {TOUR_STEPS.map((_, idx) => (
                                            <div key={idx} className={`h-2 rounded-full transition-all duration-300 ${idx === tourStep ? 'w-6 bg-brand-5' : 'w-2 bg-brand-2/40'}`}></div>
                                        ))}
                                    </div>
                                </div>
                                <div className="p-4 bg-brand-1/10 border-t border-brand-1/50 flex gap-3">
                                    <button onClick={finishTour} className="flex-1 py-3 rounded-xl text-xs font-bold text-brand-4 hover:bg-brand-1/30 transition-colors">跳過導覽</button>
                                    <button onClick={nextTourStep} className="flex-[2] py-3 rounded-xl text-sm font-bold bg-brand-5 text-white hover:bg-brand-4 transition-colors shadow-md">
                                        {tourStep === TOUR_STEPS.length - 1 ? '開始記帳' : '下一步'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    {/* 搬家提示 Modal */}
                    {showMigrateModal && (
                        <div className="fixed inset-0 bg-brand-5/80 backdrop-blur-sm z-[200] flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 text-center">
                                <div className="text-5xl mb-4">📦</div>
                                <h3 className="text-xl font-bold text-brand-5 mb-2">發現本地記帳資料！</h3>
                                <p className="text-sm text-brand-4 mb-8">系統偵測到您在單機模式累積了紀錄。<br />是否要一鍵搬家到雲端？未來換手機或電腦登入都不怕遺失囉！</p>
                                <div className="flex gap-4">
                                    <button onClick={() => setShowMigrateModal(false)} className="flex-1 py-3 rounded-xl text-brand-4 font-semibold hover:bg-brand-1/30 transition-colors">先不要</button>
                                    <button onClick={performMigration} className="flex-1 py-3 rounded-xl bg-brand-5 text-white font-bold shadow-md hover:bg-brand-4 transition-colors">🚀 一鍵搬上雲端</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- 桌機版：左側固定選單 (Sidebar) --- */}
                    <aside className="hidden md:flex flex-col w-64 bg-brand-5 text-brand-1 shadow-2xl z-20">
                        <div className="p-8 pb-6">
                            <h1 className="text-2xl font-bold text-white flex items-center gap-3 mb-1 tracking-wide">
                                <i className="fa-solid fa-snowflake text-brand-3 text-2xl"></i>
                                ICEMemory
                            </h1>
                            <div className="flex items-center gap-2 mt-2 opacity-70">
                                <i className={`fa-solid ${syncIcon.icon} ${syncIcon.color} text-xs`}></i>
                                <span className="text-[10px] uppercase tracking-wider">{syncIcon.text}</span>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 space-y-2 mt-4">
                            <SidebarBtn icon="fa-plus" label="記一筆" active={activeTab === 'add'} onClick={() => setActiveTab('add')} isPrimary />
                            <div className="h-6 border-b border-brand-4/40 mx-4 mb-6"></div>
                            <SidebarBtn icon="fa-border-all" label="總覽儀表板" active={activeTab === 'dash'} onClick={() => setActiveTab('dash')} />
                            <SidebarBtn icon="fa-calendar-days" label="可視化日曆" active={activeTab === 'calendar'} onClick={() => setActiveTab('calendar')} />
                            <SidebarBtn icon="fa-file-invoice" label="歷史與報表" active={activeTab === 'history'} onClick={() => setActiveTab('history')} />
                            <SidebarBtn icon="fa-sliders" label="系統設定" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
                        </nav>
                    </aside>

                    {/* --- 主要內容區 (Main Content) --- */}
                    <main className="flex-1 flex flex-col relative w-full h-full overflow-hidden">
                        {/* 手機版：頂部 Header */}
                        <header className="md:hidden px-6 pt-8 pb-4 flex justify-between items-center z-10 shrink-0 bg-white border-b border-brand-2/20 shadow-sm">
                            <h1 className="text-xl font-bold text-brand-5 flex items-center gap-2">
                                <i className="fa-solid fa-snowflake text-brand-3"></i> ICEMemory
                            </h1>
                            <div className="flex items-center gap-1.5 opacity-80" title={syncIcon.text}>
                                <i className={`fa-solid ${syncIcon.icon} ${syncIcon.color} text-sm`}></i>
                            </div>
                        </header>

                        {/* 視圖內容 */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-10 pb-28 md:pb-10 z-10">
                            <div className="max-w-6xl mx-auto">
                                {activeTab === 'dash' && <DashboardView
                                    todayTotal={todayTotal} viewMonthTotal={viewMonthTotal} thisWeekTotal={thisWeekTotal}
                                    settings={settings} goalCurrentVal={goalCurrentVal} categories={categories}
                                    debtsByPerson={debtsByPerson} payDebt={payDebt} viewMonth={viewMonth} onPrevMonth={handlePrevMonth} onNextMonth={handleNextMonth} holidays={holidays}
                                />}
                                {activeTab === 'calendar' && <CalendarView
                                    viewMonth={viewMonth} onPrevMonth={handlePrevMonth} onNextMonth={handleNextMonth}
                                    records={records} deleteRecord={deleteRecord} updateRecord={updateRecord} categories={categories}
                                    settings={settings} holidays={holidays}
                                />}
                                {activeTab === 'add' && <AddView records={records} setRecords={addRecord} categories={categories} setActiveTab={setActiveTab} />}
                                {activeTab === 'history' && <HistoryView
                                    records={records} categories={categories} settings={settings}
                                    deleteRecord={deleteRecord} updateRecord={updateRecord}
                                    viewMonth={viewMonth} onPrevMonth={handlePrevMonth} onNextMonth={handleNextMonth} holidays={holidays}
                                />}
                                {activeTab === 'settings' && <SettingsView
                                    settings={settings} updateSettings={updateSettings} categories={categories}
                                    records={records} importRecords={importRecords} isCloudMode={isCloudMode} user={user} fbAuth={fbAuth}
                                />}
                            </div>
                        </div>

                        {/* 手機版：底部浮動導覽列 */}
                        <nav className="md:hidden absolute bottom-0 w-full h-[72px] bg-white border-t border-brand-2/20 flex justify-around items-center px-1 z-20 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-safe">
                            <MobileNavBtn icon="fa-border-all" label="總覽" active={activeTab === 'dash'} onClick={() => setActiveTab('dash')} />
                            <MobileNavBtn icon="fa-calendar-days" label="日曆" active={activeTab === 'calendar'} onClick={() => setActiveTab('calendar')} />
                            <button onClick={() => setActiveTab('add')} className={`w-12 h-12 shrink-0 rounded-xl flex items-center justify-center text-lg transform transition-all ${activeTab === 'add' ? 'bg-brand-5 text-white shadow-md scale-105' : 'bg-brand-1 text-brand-5 hover:bg-brand-2/30'}`} style={{ marginTop: '-16px' }}>
                                <i className="fa-solid fa-plus"></i>
                            </button>
                            <MobileNavBtn icon="fa-file-invoice" label="紀錄" active={activeTab === 'history'} onClick={() => setActiveTab('history')} />
                            <MobileNavBtn icon="fa-sliders" label="設定" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
                        </nav>
                    </main>
                </div>
            );
        }

        // --- 桌機側邊欄按鈕 (Premium) ---
        function SidebarBtn({ icon, label, active, onClick, isPrimary }) {
            if (isPrimary) return (<button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition-all ${active ? 'bg-brand-3 text-white shadow-md' : 'bg-white/10 text-white hover:bg-white/20'} mb-2`}><i className={`fa-solid ${icon} text-base w-5 text-center`}></i> <span className="text-sm">{label}</span></button>)
            return (<button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg font-medium transition-all ${active ? 'bg-brand-4/50 text-white border-l-4 border-brand-3 rounded-l-sm' : 'text-brand-2 hover:bg-brand-4/30 hover:text-white border-l-4 border-transparent'}`}><i className={`fa-solid ${icon} text-base w-5 text-center ${active ? 'text-brand-3' : ''}`}></i> <span className="text-sm">{label}</span></button>);
        }
        function MobileNavBtn({ icon, label, active, onClick }) {
            return (<button onClick={onClick} className={`flex flex-col items-center gap-1 w-12 sm:w-14 transition-all pt-1 ${active ? 'text-brand-5' : 'text-brand-2'}`}><i className={`fa-solid ${icon} text-xl mb-0.5`}></i><span className="text-[10px] font-medium">{label}</span></button>);
        }

        // ==========================================
        // 1. 新增頁面 (Add View)
        // ==========================================
        function AddView({ records, setRecords, categories, setActiveTab }) {
            const [name, setName] = useState('');
            const [price, setPrice] = useState('');
            const [categoryId, setCategoryId] = useState(categories[0].id);
            const [payer, setPayer] = useState('');
            const [memo, setMemo] = useState('');
            const [rating, setRating] = useState(0);

            const [sugar, setSugar] = useState('');
            const [ice, setIce] = useState('');

            const isDrink = DRINK_CATEGORIES.includes(categoryId);

            const [isNameFocused, setIsNameFocused] = useState(false);
            const [recordDate, setRecordDate] = useState(() => new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0]);

            const nameInputRef = useRef(null);
            const priceInputRef = useRef(null);

            useEffect(() => { if (window.innerWidth > 768 && nameInputRef.current) nameInputRef.current.focus(); }, []);

            const setDateOffset = (days) => {
                const d = new Date(); d.setDate(d.getDate() + days);
                setRecordDate(new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0]);
            }

            const recentPayers = useMemo(() => {
                const payers = records.map(r => r.payer).filter(Boolean);
                const counts = {};
                payers.forEach(p => counts[p] = (counts[p] || 0) + 1);
                return Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 4);
            }, [records]);

            const suggestions = useMemo(() => {
                if (name.trim() === '') return [];
                const uniqueItems = []; const seenNames = new Set();
                for (let i = records.length - 1; i >= 0; i--) {
                    const r = records[i];
                    if (!seenNames.has(r.name)) {
                        if (r.name.toLowerCase().includes(name.toLowerCase()) || name.toLowerCase().includes(r.name.toLowerCase())) {
                            uniqueItems.push(r); seenNames.add(r.name);
                        }
                    }
                    if (uniqueItems.length >= 6) break;
                }
                return uniqueItems;
            }, [name, records]);

            const applySuggestion = (s) => {
                setName(s.name); setPrice(s.price); setCategoryId(s.categoryId);
                if (s.memo) setMemo(s.memo); if (s.sugar) setSugar(s.sugar); if (s.ice) setIce(s.ice);
                setIsNameFocused(false);
                if (priceInputRef.current) priceInputRef.current.focus();
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                let finalName = name.trim(); let finalPrice = price;

                if (!finalPrice) {
                    const match = finalName.match(/^(.+?)\s+(\d+)$/);
                    if (match) { finalName = match[1].trim(); finalPrice = match[2]; }
                    else { if (priceInputRef.current) priceInputRef.current.focus(); return; }
                }

                if (!finalName || !finalPrice) return;

                const todayStr = new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
                let recordTimestamp = Date.now();
                if (recordDate !== todayStr) recordTimestamp = new Date(recordDate).getTime() + (12 * 60 * 60 * 1000);

                // AddRecord is now an async function that handles either cloud or local
                setRecords({
                    id: Date.now().toString(), date: recordTimestamp, name: finalName, price: Number(finalPrice), categoryId,
                    payer: payer.trim() || null, isPaid: payer.trim() ? false : true, memo: memo.trim(), rating,
                    sugar: isDrink ? sugar : '', ice: isDrink ? ice : ''
                });

                setName(''); setPrice(''); setPayer(''); setMemo(''); setRating(0); setSugar(''); setIce('');
                setActiveTab('dash');
            };

            return (
                <div className="w-full max-w-4xl mx-auto animate-fade-in flex flex-col gap-6 md:gap-8 pt-2 md:pt-4 pb-10">
                    <div className="flex items-center justify-between mb-2">
                        <h2 className="text-2xl md:text-3xl font-bold text-brand-5 hidden md:block tracking-tight">快速記帳</h2>
                    </div>

                    <form onSubmit={handleSubmit} className="flex flex-col gap-6 md:gap-8">
                        {/* 日期選擇區 */}
                        <div className="flex flex-col md:flex-row items-start md:items-center gap-4">
                            <label className="text-sm font-semibold text-brand-4 whitespace-nowrap"><i className="fa-solid fa-calendar-day mr-2 text-brand-3"></i>消費日期</label>
                            <div className="flex flex-wrap gap-3 w-full md:w-auto items-center">
                                <input type="date" value={recordDate} onChange={e => setRecordDate(e.target.value)} className="bg-white border border-brand-2/30 rounded-lg px-4 py-2.5 text-brand-5 focus:border-brand-3 focus:ring-1 focus:ring-brand-3 outline-none font-medium text-sm flex-1 md:flex-none cursor-pointer shadow-sm" />
                                <div className="flex gap-2 border border-brand-2/30 rounded-lg p-1 bg-white shadow-sm">
                                    <button type="button" onClick={() => setDateOffset(0)} className="text-xs text-brand-4 hover:bg-brand-1 px-3 py-1.5 rounded-md font-medium transition-colors">今天</button>
                                    <div className="w-px bg-brand-2/30 my-1"></div>
                                    <button type="button" onClick={() => setDateOffset(-1)} className="text-xs text-brand-4 hover:bg-brand-1 px-3 py-1.5 rounded-md font-medium transition-colors">昨天</button>
                                </div>
                            </div>
                        </div>

                        {/* 動態分類按鈕 */}
                        <div className="grid grid-cols-4 md:flex md:flex-wrap md:gap-3 gap-2">
                            {categories.map(cat => (
                                <button type="button" key={cat.id} onClick={() => { setCategoryId(cat.id); if (window.innerWidth > 768 && nameInputRef.current) nameInputRef.current.focus(); }}
                                    className={`flex md:flex-row flex-col items-center justify-center md:px-5 md:py-3 py-3 px-1 rounded-xl transition-all border ${categoryId === cat.id ? 'bg-brand-5 text-white border-brand-5 shadow-md' : 'bg-white text-brand-4 border-brand-2/20 hover:border-brand-3 hover:text-brand-3'}`}>
                                    <i className={`${cat.icon} text-xl md:text-base md:mr-2`}></i>
                                    <span className="text-[10px] md:text-sm font-medium mt-1.5 md:mt-0 whitespace-nowrap truncate w-full">{cat.name}</span>
                                </button>
                            ))}
                        </div>

                        {/* 攤平的統一輸入卡片 */}
                        <div className="card-panel p-5 md:p-8 flex flex-col gap-6 md:gap-8 relative z-20">
                            {/* 第一排：品項與金額 */}
                            <div className="flex flex-col md:flex-row gap-6 md:gap-8 items-start relative">
                                <div className="flex-1 w-full relative">
                                    <div className="flex justify-between items-end mb-2">
                                        <label className="block text-xs font-semibold text-brand-4">品項名稱</label>
                                        <span className="text-[10px] text-brand-3/80 font-medium hidden md:inline-block"><i className="fa-solid fa-bolt text-yellow-500 mr-1"></i>Ninja 極速支援：品項 空格 金額 (例: 麥當勞 150)</span>
                                    </div>
                                    <input ref={nameInputRef} type="text" required value={name} onChange={e => setName(e.target.value)} onFocus={() => setIsNameFocused(true)} onBlur={() => setTimeout(() => setIsNameFocused(false), 200)}
                                        placeholder="例：50嵐 冰淇淋紅茶 65" className="w-full bg-white border border-brand-2/40 rounded-xl px-4 py-3.5 text-brand-5 focus:border-brand-3 focus:ring-1 focus:ring-brand-3 outline-none placeholder:text-brand-2 font-medium transition-all"
                                    />
                                    {/* 無腦點餐小抄 Dropdown */}
                                    {isNameFocused && name.trim() !== '' && suggestions.length > 0 && (
                                        <div className="absolute top-[calc(100%+8px)] left-0 w-full bg-brand-5 border border-brand-5 rounded-xl shadow-dropdown z-50 overflow-hidden animate-fade-in flex flex-col max-h-64">
                                            <div className="text-[10px] text-brand-2 uppercase tracking-widest px-4 py-2 border-b border-brand-4/50 bg-[#151B21]">💡 歷史點餐小抄</div>
                                            <div className="overflow-y-auto custom-scrollbar">
                                                {suggestions.map((s, idx) => (
                                                    <div key={`${s.id}-${idx}`} onClick={() => applySuggestion(s)} className="p-4 hover:bg-brand-4 cursor-pointer flex justify-between items-center border-b border-brand-4/30 last:border-0 transition-colors">
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-white font-medium">{s.name}</span>
                                                            {s.sugar && s.ice && <span className="text-[10px] text-brand-3 bg-brand-3/20 px-1 rounded">[{s.sugar}/{s.ice}]</span>}
                                                            {s.memo && <span className="text-brand-2 text-xs hidden md:inline">({s.memo})</span>}
                                                            {s.rating === 1 && <i className="fa-solid fa-thumbs-up text-brand-3 text-xs ml-1"></i>}
                                                            {s.rating === -1 && <i className="fa-solid fa-thumbs-down text-[#A56B5D] text-xs ml-1"></i>}
                                                        </div>
                                                        <span className="text-brand-1 font-bold">${s.price}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="md:w-56 shrink-0 w-full">
                                    <label className="block text-xs font-semibold text-brand-4 mb-2">金額 (若前方已輸入可留白)</label>
                                    <div className="relative flex items-center">
                                        <span className="absolute left-4 text-brand-4 font-bold text-lg">NT$</span>
                                        <input ref={priceInputRef} type="number" min="0" value={price} onChange={e => setPrice(e.target.value)} placeholder="0"
                                            className="w-full bg-white border border-brand-2/40 rounded-xl pl-14 pr-4 py-3.5 text-lg font-bold text-brand-5 focus:border-brand-3 focus:ring-1 focus:ring-brand-3 outline-none placeholder:text-brand-2 transition-all" />
                                    </div>
                                </div>
                            </div>

                            {/* 飲料專屬糖冰客製區 */}
                            {isDrink && (
                                <div className="bg-[#FAF7F2] p-5 rounded-2xl border border-[#D5C6BA] flex flex-col md:flex-row gap-6 animate-fade-in shadow-sm">
                                    <div className="flex-1">
                                        <label className="block text-xs font-semibold text-brand-4 mb-3"><i className="fa-solid fa-cubes-stacked mr-1.5 text-brand-3"></i>甜度</label>
                                        <div className="flex flex-wrap gap-2">
                                            {SUGAR_OPTIONS.map(s => (
                                                <button type="button" key={s} onClick={() => setSugar(s)} className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all border shadow-sm active:scale-95 ${sugar === s ? 'bg-brand-3 text-white border-brand-3' : 'bg-white text-brand-4 border-brand-2/30 hover:border-brand-3 hover:text-brand-3'}`}>{s}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex-1">
                                        <label className="block text-xs font-semibold text-brand-4 mb-3"><i className="fa-solid fa-icicles mr-1.5 text-[#697F93]"></i>冰塊</label>
                                        <div className="flex flex-wrap gap-2">
                                            {ICE_OPTIONS.map(i => (
                                                <button type="button" key={i} onClick={() => setIce(i)} className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all border shadow-sm active:scale-95 ${ice === i ? 'bg-[#697F93] text-white border-[#697F93]' : 'bg-white text-brand-4 border-brand-2/30 hover:border-[#697F93] hover:text-[#697F93]'}`}>{i}</button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* 第三排：攤平的代墊與備註區塊 */}
                            <div className="flex flex-col md:flex-row gap-6 pt-6 border-t border-brand-1/50">
                                <div className="flex-1">
                                    <div className="flex justify-between items-end mb-3">
                                        <label className="block text-xs font-semibold text-[#A56B5D]"><i className="fa-solid fa-user-group mr-1.5 opacity-70"></i>代墊人 (選填)</label>
                                    </div>
                                    {recentPayers.length > 0 && (
                                        <div className="flex flex-wrap gap-2 mb-3">
                                            {recentPayers.map(p => (
                                                <button key={p} type="button" onClick={() => setPayer(p)} className="text-xs bg-[#FAF7F2] hover:bg-[#E8E1DA] text-[#A56B5D] px-3 py-1.5 rounded-lg font-semibold transition-colors border border-[#D5C6BA] flex items-center gap-1.5 active:scale-95 shadow-sm">
                                                    <i className="fa-solid fa-plus opacity-50 text-[10px]"></i> {p}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                    <input type="text" value={payer} onChange={e => setPayer(e.target.value)} placeholder="手動輸入同事名字"
                                        className="w-full bg-white border border-brand-2/40 rounded-xl px-4 py-3.5 text-brand-5 focus:border-[#A56B5D] focus:ring-1 focus:ring-[#A56B5D] outline-none placeholder:text-brand-2 text-sm transition-all" />
                                </div>
                                <div className="flex-1 flex flex-col">
                                    <label className="block text-xs font-semibold text-brand-4 mb-3"><i className="fa-solid fa-pen-to-square mr-1.5 opacity-70"></i>{isDrink ? '配料加點與評價' : '備註與評價 (選填)'}</label>
                                    <div className="flex gap-2 h-[50px]">
                                        <input type="text" value={memo} onChange={e => setMemo(e.target.value)} placeholder={isDrink ? "例：+白玉波霸" : "例：微糖少冰"}
                                            className="flex-1 bg-white border border-brand-2/40 rounded-xl px-4 text-brand-5 focus:border-brand-3 focus:ring-1 focus:ring-brand-3 outline-none placeholder:text-brand-2 text-sm transition-all" />
                                        <button type="button" onClick={() => setRating(rating === 1 ? 0 : 1)} className={`w-[50px] shrink-0 rounded-xl border transition-all text-base flex items-center justify-center shadow-sm ${rating === 1 ? 'bg-brand-5 text-white border-brand-5' : 'bg-[#FAF7F2] text-brand-4 border-brand-2/20 hover:border-brand-3 hover:text-brand-3'}`}><i className="fa-solid fa-thumbs-up"></i></button>
                                        <button type="button" onClick={() => setRating(rating === -1 ? 0 : -1)} className={`w-[50px] shrink-0 rounded-xl border transition-all text-base flex items-center justify-center shadow-sm ${rating === -1 ? 'bg-[#A56B5D] text-white border-[#A56B5D]' : 'bg-[#FAF7F2] text-brand-4 border-brand-2/20 hover:border-[#A56B5D] hover:text-[#A56B5D]'}`}><i className="fa-solid fa-thumbs-down"></i></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        {/* 送出按鈕 */}
                        <div className="pt-2 md:pt-4">
                            <button type="submit" className="w-full md:w-auto md:min-w-[240px] md:ml-auto bg-brand-5 text-white font-semibold text-base py-4 px-8 rounded-xl shadow-premium hover:shadow-premium-hover hover:bg-brand-4 transition-all flex justify-center items-center gap-2 active:scale-[0.98]">
                                <i className="fa-solid fa-check"></i> 儲存紀錄 (Enter)
                            </button>
                        </div>
                    </form>
                </div>
            );
        }

        // --- 2. 總覽儀表板 (Dashboard View) ---
        function DashboardView({ todayTotal, viewMonthTotal, thisWeekTotal, settings, goalCurrentVal, categories, debtsByPerson, payDebt, viewMonth, onPrevMonth, onNextMonth }) {
            let currentTotal = viewMonthTotal;
            let budgetLabel = '預算使用率 (該月)';

            if (settings.budgetType === 'daily') {
                currentTotal = todayTotal; budgetLabel = '預算使用率 (今日)';
            } else if (settings.budgetType === 'weekly') {
                currentTotal = thisWeekTotal; budgetLabel = '預算使用率 (本週)';
            }

            const isOverBudget = currentTotal > settings.budget;
            const targetCatName = categories.find(c => c.id === settings.goalCategory)?.name || '目標';

            const goalIcons = Array.from({ length: Math.max(settings.goalLimit, goalCurrentVal) }, (_, i) =>
                <i key={i} className={`fa-solid fa-bullseye text-2xl mx-1 ${i < goalCurrentVal ? 'text-brand-2/30' : 'text-brand-3'}`} title={i < goalCurrentVal ? "已達標" : "剩餘扣打"}></i>
            );

            const [copiedPerson, setCopiedPerson] = useState(null);
            const handleCopyMessage = (person, data) => {
                const message = `Hi ${person}，我還欠你 $${data.total} (${data.items.join(', ')})，我等等轉給你喔！`;
                const textArea = document.createElement("textarea"); textArea.value = message; document.body.appendChild(textArea); textArea.select();
                try { document.execCommand('copy'); setCopiedPerson(person); setTimeout(() => setCopiedPerson(null), 2000); } catch (err) { }
                document.body.removeChild(textArea);
            };

            return (
                <div className="flex flex-col gap-6 animate-fade-in pb-4">
                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-2">
                        <h2 className="text-2xl font-bold text-brand-5 hidden md:block tracking-tight">總覽儀表板</h2>
                        <MonthNavigator viewMonth={viewMonth} onPrev={onPrevMonth} onNext={onNextMonth} />
                    </div>

                    {/* 置頂待還款區 */}
                    {Object.keys(debtsByPerson).length > 0 && (
                        <div className="bg-[#FAF7F2] border border-[#D5C6BA] p-5 rounded-2xl shadow-sm relative overflow-hidden">
                            <h3 className="text-[#A56B5D] font-bold text-sm mb-4 flex items-center gap-2"><i className="fa-solid fa-triangle-exclamation text-lg"></i> 待還款提醒</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {Object.entries(debtsByPerson).map(([person, data]) => (
                                    <div key={person} className="bg-white rounded-xl p-4 flex flex-col gap-4 shadow-sm border border-[#E8E1DA]">
                                        <div>
                                            <p className="font-semibold text-brand-5 text-sm">欠 {person} <span className="text-[#A56B5D] font-bold text-base ml-1">${data.total}</span></p>
                                            <p className="text-xs text-brand-2 truncate max-w-[200px] mt-1">{data.items.join(', ')}</p>
                                        </div>
                                        <div className="flex items-center gap-2 w-full pt-2 border-t border-brand-1/40">
                                            <button onClick={() => handleCopyMessage(person, data)} className={`flex-1 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors active:scale-95 flex justify-center items-center gap-1.5 border ${copiedPerson === person ? 'bg-green-50 text-green-600 border-green-200' : 'bg-white text-brand-4 border-brand-2/30 hover:bg-brand-1/20'}`}>
                                                {copiedPerson === person ? <><i className="fa-solid fa-check"></i> 已複製</> : <><i className="fa-regular fa-copy"></i> 複製訊息</>}
                                            </button>
                                            <button onClick={() => payDebt(person)} className="flex-1 bg-brand-5 text-white px-3 py-1.5 rounded-lg text-xs font-medium hover:bg-brand-4 transition-colors active:scale-95 flex justify-center items-center gap-1.5 shadow-sm">
                                                <i className="fa-solid fa-check"></i> 標記還清
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
                        <div className="card-panel p-6 flex flex-col justify-center items-start relative overflow-hidden">
                            <i className="fa-solid fa-wallet absolute -right-6 -bottom-6 text-7xl text-brand-1 opacity-50"></i>
                            <span className="text-xs font-medium text-brand-4 uppercase tracking-wider mb-2">今日即時花費</span>
                            <span className="text-4xl font-bold text-brand-5 flex items-baseline"><span className="text-xl font-normal mr-1 text-brand-2">$</span>{todayTotal}</span>
                        </div>
                        <div className="card-panel p-6 flex flex-col justify-center items-start relative overflow-hidden">
                            <i className="fa-solid fa-chart-line absolute -right-6 -bottom-6 text-7xl text-brand-1 opacity-50"></i>
                            <span className="text-xs font-medium text-brand-4 uppercase tracking-wider mb-2">該月累積</span>
                            <span className="text-4xl font-bold text-brand-5 flex items-baseline"><span className="text-xl font-normal mr-1 text-brand-2">$</span>{viewMonthTotal}</span>
                        </div>
                        <div className="card-panel p-6 flex flex-col justify-center">
                            <div className="flex justify-between text-xs font-medium mb-3 uppercase tracking-wider">
                                <span className="text-brand-4">{budgetLabel}</span>
                                <span className={isOverBudget ? 'text-[#A56B5D]' : 'text-brand-4'}>${currentTotal} / ${settings.budget}</span>
                            </div>
                            <div className="w-full bg-brand-1/50 rounded-full h-2.5 overflow-hidden mb-3">
                                <div className={`h-full rounded-full transition-all duration-1000 ${isOverBudget ? 'bg-[#A56B5D]' : 'bg-brand-3'}`} style={{ width: `${Math.min(100, (currentTotal / settings.budget) * 100)}%` }}></div>
                            </div>
                            {isOverBudget && <p className="text-[10px] text-[#A56B5D] font-bold text-right">已超支警示</p>}
                        </div>
                    </div>

                    {/* 自訂目標模組 (如果開啟才顯示) */}
                    {settings.goalEnabled && (
                        <div className="card-panel p-6 md:p-8 text-center flex flex-col items-center justify-center">
                            <h3 className="text-xs font-medium text-brand-4 uppercase tracking-wider mb-6"><i className="fa-solid fa-crosshairs mr-2 opacity-70"></i>{settings.goalPeriod === 'weekly' ? '本週' : '本月'} {targetCatName} 扣打</h3>
                            <div className="flex justify-center flex-wrap mb-4">{goalIcons}</div>
                            <p className="text-xs text-brand-4 font-medium bg-brand-1/30 px-4 py-2 rounded-lg inline-block">
                                {goalCurrentVal >= settings.goalLimit ? '額度已用盡，為了錢包與健康請克制' : `本階段剩餘 ${Math.max(0, settings.goalLimit - goalCurrentVal)} 次扣打`}
                            </p>
                        </div>
                    )}
                </div>
            );
        }

        // --- 可視化日曆 (Calendar View) ---
        function CalendarView({ viewMonth, onPrevMonth, onNextMonth, records, deleteRecord, updateRecord, categories, settings, holidays }) {
            const [mode, setMode] = useState('money');
            const [selectedDate, setSelectedDate] = useState(null);
            const [editingRecord, setEditingRecord] = useState(null);

            const year = viewMonth.getFullYear();
            const month = viewMonth.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDayOfWeek = new Date(year, month, 1).getDay();

            let dailyBudget = settings.budget;
            if (settings.budgetType === 'weekly') dailyBudget = Math.round(settings.budget / 7);
            if (settings.budgetType === 'monthly') dailyBudget = Math.round(settings.budget / 30);

            const gridCells = [];
            for (let i = 0; i < firstDayOfWeek; i++) { gridCells.push(null); }
            for (let day = 1; day <= daysInMonth; day++) {
                const dateTimestamp = new Date(year, month, day).getTime();
                const nextDayTimestamp = new Date(year, month, day + 1).getTime();
                const dayRecords = records.filter(r => r.date >= dateTimestamp && r.date < nextDayTimestamp);

                const totalSpent = dayRecords.reduce((sum, r) => sum + r.price, 0);
                const drinkRecords = dayRecords.filter(r => DRINK_CATEGORIES.includes(r.categoryId));
                const drinks = drinkRecords.map(r => r.name.split(' ')[0]);

                const dateStr = `${year}${String(month + 1).padStart(2, '0')}${String(day).padStart(2, '0')}`;
                const dayOfWeek = new Date(year, month, day).getDay();

                gridCells.push({ day, dateTimestamp, totalSpent, drinks, dayRecords, dateStr, dayOfWeek });
            }
