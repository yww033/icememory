            const todayTimestamp = new Date(new Date().setHours(0, 0, 0, 0)).getTime();

            return (
                <div className="flex flex-col gap-6 animate-fade-in pb-4">
                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-2 gap-4">
                        <h2 className="text-2xl font-bold text-brand-5 tracking-tight flex items-center gap-2"> 可視化日曆</h2>
                        <div className="flex bg-brand-1/40 p-1 rounded-xl shadow-inner w-full md:w-auto">
                            <button onClick={() => setMode('money')} className={`flex-1 md:w-32 py-2 text-sm font-semibold rounded-lg transition-all ${mode === 'money' ? 'bg-white text-brand-5 shadow-sm' : 'text-brand-4 hover:text-brand-5'}`}><i className="fa-solid fa-sack-dollar mr-1.5"></i> 荷包模式</button>
                            <button onClick={() => setMode('drink')} className={`flex-1 md:w-32 py-2 text-sm font-semibold rounded-lg transition-all ${mode === 'drink' ? 'bg-brand-5 text-white shadow-sm' : 'text-brand-4 hover:text-brand-5'}`}><i className="fa-solid fa-mug-hot mr-1.5"></i> 飲料地圖</button>
                        </div>
                    </div>
                    <MonthNavigator viewMonth={viewMonth} onPrev={onPrevMonth} onNext={onNextMonth} />

                    <div className="card-panel p-4 md:p-6">
                        <div className="grid grid-cols-7 gap-1 md:gap-2 mb-2">
                            {['日', '一', '二', '三', '四', '五', '六'].map((day, idx) => (
                                <div key={day} className={`text-center text-xs md:text-sm font-bold py-2 ${idx === 0 || idx === 6 ? 'text-[#A56B5D]' : 'text-brand-4'}`}>{day}</div>
                            ))}
                        </div>
                        <div className="grid grid-cols-7 gap-1 md:gap-2">
                            {gridCells.map((cell, idx) => {
                                if (!cell) return <div key={`empty-${idx}`} className="bg-brand-1/10 rounded-xl"></div>;
                                const isToday = cell.dateTimestamp === todayTimestamp;
                                const hasOverspent = mode === 'money' && cell.totalSpent > dailyBudget * 1.5;
                                const hasDrinks = mode === 'drink' && cell.drinks.length > 0;
                                const hInfo = holidays[cell.dateStr];
                                let isDayOff = cell.dayOfWeek === 0 || cell.dayOfWeek === 6;
                                let holidayName = null; let isMakeup = false;

                                if (hInfo) {
                                    isDayOff = hInfo.isHoliday;
                                    if (hInfo.isHoliday && hInfo.description !== '星期六' && hInfo.description !== '星期日') holidayName = hInfo.description;
                                    if (!hInfo.isHoliday && (cell.dayOfWeek === 0 || cell.dayOfWeek === 6)) isMakeup = true;
                                }

                                let bgClass = "bg-white border border-brand-2/20 hover:border-brand-3/50";
                                if (hasOverspent) bgClass = "bg-[#FDF3F3] border-[#E8D1D1] hover:border-[#A56B5D]";
                                if (hasDrinks) bgClass = "bg-[#F0F4F8] border-[#D1DFE8] hover:border-brand-3";
                                if (isToday) bgClass += " ring-2 ring-brand-3";

                                return (
                                    <div key={cell.day} onClick={() => setSelectedDate(cell)} className={`${bgClass} rounded-xl p-1 md:p-2 flex flex-col items-center justify-start aspect-square md:aspect-auto md:h-24 cursor-pointer transition-all active:scale-95 calendar-cell-anim`} style={{ animationDelay: `${idx * 10}ms` }}>
                                        <span className={`text-xs md:text-sm font-bold mb-0.5 ${isToday ? 'text-brand-3' : (isDayOff ? 'text-[#A56B5D]' : 'text-brand-5')}`}>{cell.day}</span>
                                        {holidayName && <span className="text-[8px] md:text-[10px] text-[#A56B5D] bg-[#FDF3F3] px-1 rounded truncate max-w-[95%] mb-0.5 text-center leading-tight shadow-sm border border-[#E8D1D1]">{holidayName}</span>}
                                        {isMakeup && <span className="text-[8px] md:text-[10px] text-brand-5 bg-brand-2/20 px-1 rounded truncate max-w-[95%] mb-0.5 text-center leading-tight shadow-sm border border-brand-2/30">💼 補班</span>}

                                        <div className="flex flex-col items-center justify-center w-full flex-1 overflow-hidden mt-0.5">
                                            {mode === 'money' && cell.totalSpent > 0 && <span className={`text-[10px] md:text-sm font-bold ${hasOverspent ? 'text-[#A56B5D]' : 'text-brand-4'}`}>${cell.totalSpent}</span>}
                                            {mode === 'drink' && cell.drinks.map((drink, i) => <span key={i} className="text-[8px] md:text-xs text-brand-5 bg-brand-1/40 px-1 py-0.5 rounded mb-0.5 truncate w-full text-center max-w-[90%] font-medium">{drink}</span>)}
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>

                    {selectedDate && !editingRecord && (

                        <div className="fixed inset-0 bg-brand-5/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in" onClick={(e) => { if (e.target === e.currentTarget) setSelectedDate(null); }}>

                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[80vh] animate-fade-in">
                                <div className="px-6 py-5 border-b border-brand-1/50 flex justify-between items-center bg-[#FAF7F2]">
                                    <div>
                                        <h3 className="font-bold text-brand-5 text-lg">{new Date(selectedDate.dateTimestamp).getMonth() + 1}月{selectedDate.day}日 明細</h3>
                                        <p className="text-xs text-brand-4 font-medium mt-1">當日總計：<span className="text-[#A56B5D] font-bold">${selectedDate.totalSpent}</span></p>
                                    </div>
                                    <button onClick={() => setSelectedDate(null)} className="w-8 h-8 bg-white rounded-full text-brand-4 hover:text-brand-5 shadow-sm flex items-center justify-center transition-colors"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="p-4 md:p-6 overflow-y-auto custom-scrollbar flex-1 bg-brand-1/10">
                                    <div className="space-y-3">
                                        {selectedDate.dayRecords.length === 0 ? (<p className="text-center text-brand-2 text-sm py-10 font-medium">這天沒有花半毛錢，太扯啦！</p>) : (
                                            selectedDate.dayRecords.sort((a, b) => b.date - a.date).map(record => {
                                                const cat = categories.find(c => c.id === record.categoryId) || categories[0];
                                                return (
                                                    <div key={record.id} className="bg-white p-4 rounded-xl flex items-center justify-between group border border-brand-2/20 shadow-sm">
                                                        <div className="flex items-center gap-3">
                                                            <div className="text-lg text-brand-3 w-10 h-10 shrink-0 rounded-lg bg-brand-1/30 flex items-center justify-center"><i className={cat?.icon}></i></div>
                                                            <div>
                                                                <RecordDisplayName record={record} />
                                                                <div className="text-[10px] md:text-xs text-brand-2 mt-1.5 flex flex-wrap gap-2 items-center">
                                                                    {record.payer && !record.isPaid && <span className="text-[#A56B5D] flex items-center gap-1"><i className="fa-solid fa-circle text-[6px]"></i>代墊: {record.payer}</span>}
                                                                    {record.payer && record.isPaid && <span className="text-brand-3 flex items-center gap-1"><i className="fa-solid fa-check text-[8px]"></i>已還: {record.payer}</span>}
                                                                    {record.memo && <span className="text-brand-4 flex items-center gap-1"><i className="fa-solid fa-quote-left text-[8px]"></i>{record.memo}</span>}
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-1">
                                                            <span className="font-bold text-brand-5 text-sm md:text-base mr-2">${record.price}</span>
                                                            <button onClick={() => setEditingRecord(record)} className="text-brand-3 p-2 hover:bg-brand-1/60 rounded-lg transition-colors"><i className="fa-solid fa-pen text-sm"></i></button>
                                                            <button onClick={() => { deleteRecord(record.id); setSelectedDate(prev => ({ ...prev, dayRecords: prev.dayRecords.filter(r => r.id !== record.id), totalSpent: prev.totalSpent - record.price })); }} className="text-brand-2 p-2 hover:text-[#A56B5D] hover:bg-[#FDF3F3] rounded-lg transition-colors"><i className="fa-solid fa-trash-can text-sm"></i></button>
                                                        </div>
                                                    </div>
                                                )
                                            })
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    {editingRecord && (<EditModal record={editingRecord} categories={categories} onClose={() => setEditingRecord(null)} onSave={(updatedRecord) => { updateRecord(updatedRecord); setEditingRecord(null); setSelectedDate(null); }} />)}
                </div>
            );
        }

        // --- 3. 歷史與報表 (History View) ---
        function HistoryView({ records, categories, settings, deleteRecord, updateRecord, viewMonth, onPrevMonth, onNextMonth, holidays }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedShop, setSelectedShop] = useState(null); // 控制情報卡彈窗
            const [editingRecord, setEditingRecord] = useState(null);
            const [collapsedGroups, setCollapsedGroups] = useState({});
            const toggleGroup = (groupName) => { setCollapsedGroups(prev => ({ ...prev, [groupName]: !prev[groupName] })); };

            const [timeScale, setTimeScale] = useState('monthly');
            const [viewYear, setViewYear] = useState(() => viewMonth.getFullYear());
            const [customStart, setCustomStart] = useState(() => { const d = new Date(); d.setMonth(d.getMonth() - 1); return d.toISOString().split('T')[0]; });
            const [customEnd, setCustomEnd] = useState(() => new Date().toISOString().split('T')[0]);

            const filteredRecords = useMemo(() => {
                if (timeScale === 'monthly') {
                    const start = viewMonth.getTime(); const end = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0, 23, 59, 59, 999).getTime();
                    return records.filter(r => r.date >= start && r.date <= end);
                } else if (timeScale === 'yearly') {
                    const start = new Date(viewYear, 0, 1).getTime(); const end = new Date(viewYear, 11, 31, 23, 59, 59, 999).getTime();
                    return records.filter(r => r.date >= start && r.date <= end);
                } else {
                    const start = new Date(customStart).getTime(); const end = new Date(customEnd).getTime() + (23 * 3600 * 1000 + 59 * 60 * 1000 + 59 * 1000 + 999);
                    return records.filter(r => r.date >= start && r.date <= end);
                }
            }, [records, timeScale, viewMonth, viewYear, customStart, customEnd]);

            const sortedRecords = [...filteredRecords].sort((a, b) => b.date - a.date);
            const displayRecords = sortedRecords.filter(r => r.name.toLowerCase().includes(searchTerm.toLowerCase()) || (r.payer && r.payer.toLowerCase().includes(searchTerm.toLowerCase())) || (r.memo && r.memo.toLowerCase().includes(searchTerm.toLowerCase())));

            const catStats = filteredRecords.reduce((acc, curr) => { acc[curr.categoryId] = (acc[curr.categoryId] || 0) + Number(curr.price); return acc; }, {});
            const topItems = Object.entries(filteredRecords.reduce((acc, curr) => { acc[curr.name] = (acc[curr.name] || 0) + 1; return acc; }, {})).sort((a, b) => b[1] - a[1]).slice(0, 3);
            const totalExpense = filteredRecords.reduce((sum, r) => sum + r.price, 0);

            // 平均花費計算：依照使用者的設定切換 (workdays 或是 alldays)
            const dynamicAvg = useMemo(() => {
                if (filteredRecords.length === 0) return 0;

                const isWorkingDay = (timestamp) => {
                    const d = new Date(timestamp);
                    const dateStr = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;
                    if (holidays && holidays[dateStr]) return !holidays[dateStr].isHoliday;
                    const day = d.getDay(); return day >= 1 && day <= 5;
                };

                let validTotal = 0;
                filteredRecords.forEach(r => {
                    if (settings.avgCalcMethod === 'all_days' || isWorkingDay(r.date)) validTotal += r.price;
                });

                const startTimestamp = Math.min(...filteredRecords.map(r => r.date));
                if (!startTimestamp || !isFinite(startTimestamp)) return 0;

                let current = new Date(timeScale === 'monthly' ? viewMonth.getTime() : startTimestamp);
                let endLimit = Date.now();
                if (timeScale === 'monthly') endLimit = Math.min(Date.now(), new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0).getTime());
                else if (timeScale === 'yearly') endLimit = Math.min(Date.now(), new Date(viewYear, 11, 31, 23, 59, 59, 999).getTime());
                else endLimit = Math.min(Date.now(), new Date(customEnd).getTime() + 86399999);

                const endDate = new Date(endLimit);
                current.setHours(0, 0, 0, 0); endDate.setHours(23, 59, 59, 999);

                let validDaysCount = 0;
                while (current <= endDate) {
                    if (settings.avgCalcMethod === 'all_days' || isWorkingDay(current.getTime())) validDaysCount++;
                    current.setDate(current.getDate() + 1);
                }
                return validDaysCount > 0 ? Math.round(validTotal / validDaysCount) : 0;
            }, [filteredRecords, timeScale, viewMonth, viewYear, customEnd, holidays, settings.avgCalcMethod]);

            // 1. 綜合熱門常客榜 (依「次數」排名，次數相同則依「金額」)
            // 1. 綜合熱門常客榜 (升級防呆邏輯與細節打包)
            const generalReport = useMemo(() => {
                const shopStats = {};
                filteredRecords.forEach(r => {
                    const parts = r.name.trim().split(' ');
                    const shop = parts.length > 1 ? parts[0] : (r.name || '未命名');
                    const item = parts.length > 1 ? parts.slice(1).join(' ') : '單品';
                    if (!shopStats[shop]) shopStats[shop] = { total: 0, count: 0, items: {} };
                    shopStats[shop].total += r.price; shopStats[shop].count += 1;
                    const itemKey = `${item}${r.sugar && r.ice ? ` (${r.sugar}/${r.ice})` : ''}`;
                    shopStats[shop].items[itemKey] = (shopStats[shop].items[itemKey] || 0) + 1;
                });
                return Object.entries(shopStats).sort((a, b) => (b[1].count - a[1].count) || (b[1].total - a[1].total)).slice(0, 3).map(([shopName, stats]) => {
                    const sortedItems = Object.entries(stats.items).sort((a, b) => b[1] - a[1]);
                    let topItemStr = '無';
                    if (sortedItems.length > 0) {
                        // 防呆邏輯：最高次數只有 1，代表每次都點不一樣
                        topItemStr = sortedItems[0][1] === 1 ? '🌟 愛嘗鮮 (皆不同)' : sortedItems[0][0];
                    }
                    return { shopName, total: stats.total, count: stats.count, topItem: topItemStr, allItems: sortedItems };
                });
            }, [filteredRecords]);

            // 2. 手搖飲金賞 (升級防呆邏輯與細節打包)
            const drinkReport = useMemo(() => {
                const drinks = filteredRecords.filter(r => DRINK_CATEGORIES.includes(r.categoryId));
                const shopStats = {};
                drinks.forEach(r => {
                    const parts = r.name.trim().split(' ');
                    const shop = parts.length > 1 ? parts[0] : (r.name || '未命名飲料');
                    const item = parts.length > 1 ? parts.slice(1).join(' ') : '單品';
                    if (!shopStats[shop]) shopStats[shop] = { total: 0, count: 0, items: {} };
                    shopStats[shop].total += r.price; shopStats[shop].count += 1;
                    const itemKey = `${item}${r.sugar && r.ice ? ` (${r.sugar}/${r.ice})` : ''}`;
                    shopStats[shop].items[itemKey] = (shopStats[shop].items[itemKey] || 0) + 1;
                });
                return Object.entries(shopStats).sort((a, b) => (b[1].count - a[1].count) || (b[1].total - a[1].total)).slice(0, 3).map(([shopName, stats]) => {
                    const sortedItems = Object.entries(stats.items).sort((a, b) => b[1] - a[1]);
                    let topItemStr = '無';
                    if (sortedItems.length > 0) {
                        topItemStr = sortedItems[0][1] === 1 ? '🌟 隨機喝 (皆不同)' : sortedItems[0][0];
                    }
                    return { shopName, total: stats.total, count: stats.count, topItem: topItemStr, allItems: sortedItems };
                });
            }, [filteredRecords]);

            const groupedRecords = useMemo(() => {
                if (timeScale === 'monthly') return { '該月明細': displayRecords };
                const groups = {};
                displayRecords.forEach(r => {
                    const d = new Date(r.date);
                    const key = `${d.getFullYear()}年${d.getMonth() + 1}月`;
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(r);
                });
                return groups;
            }, [displayRecords, timeScale]);

            const reportTitle = timeScale === 'yearly' ? `${viewYear} 年度` : (timeScale === 'monthly' ? '該月' : '指定期間');
            const avgLabel = settings.avgCalcMethod === 'workdays' ? '工作日平均' : '每日平均';
            const avgIcon = settings.avgCalcMethod === 'workdays' ? 'fa-briefcase' : 'fa-calendar-day';

            return (
                <div className="flex flex-col gap-6 animate-fade-in h-full pb-4">
                    <div className="flex flex-col md:flex-row md:items-center justify-between mb-2">
                        <h2 className="text-2xl font-bold text-brand-5 hidden md:block tracking-tight">歷史與報表</h2>
                        <div className="flex bg-brand-1/40 p-1 rounded-xl shadow-inner w-full md:w-auto">
                            <button onClick={() => setTimeScale('monthly')} className={`flex-1 md:w-24 py-1.5 text-xs font-bold rounded-lg transition-all ${timeScale === 'monthly' ? 'bg-white text-brand-5 shadow-sm' : 'text-brand-4 hover:text-brand-5'}`}>月度</button>
                            <button onClick={() => setTimeScale('yearly')} className={`flex-1 md:w-24 py-1.5 text-xs font-bold rounded-lg transition-all ${timeScale === 'yearly' ? 'bg-white text-brand-5 shadow-sm' : 'text-brand-4 hover:text-brand-5'}`}>年度</button>
                            <button onClick={() => setTimeScale('custom')} className={`flex-1 md:w-24 py-1.5 text-xs font-bold rounded-lg transition-all ${timeScale === 'custom' ? 'bg-white text-brand-5 shadow-sm' : 'text-brand-4 hover:text-brand-5'}`}>自訂</button>
                        </div>
                    </div>

                    {timeScale === 'monthly' && <MonthNavigator viewMonth={viewMonth} onPrev={onPrevMonth} onNext={onNextMonth} />}
                    {timeScale === 'yearly' && (
                        <div className="flex items-center justify-between card-panel px-4 py-3 mb-6 w-full max-w-sm mx-auto md:mx-0">
                            <button onClick={() => setViewYear(y => y - 1)} className="w-8 h-8 rounded-lg text-brand-4 hover:bg-brand-1/50 transition-colors flex items-center justify-center active:scale-95"><i className="fa-solid fa-chevron-left text-sm"></i></button>
                            <span className="font-bold text-brand-5 text-base flex items-center gap-2"><i className="fa-regular fa-calendar text-brand-3"></i> {viewYear} 年度</span>
                            <button onClick={() => setViewYear(y => y + 1)} className="w-8 h-8 rounded-lg text-brand-4 hover:bg-brand-1/50 transition-colors flex items-center justify-center active:scale-95"><i className="fa-solid fa-chevron-right text-sm"></i></button>
                        </div>
                    )}
                    {timeScale === 'custom' && (
                        <div className="flex items-center gap-2 card-panel px-4 py-3 mb-6 w-full max-w-sm mx-auto md:mx-0">
                            <input type="date" value={customStart} onChange={e => setCustomStart(e.target.value)} className="bg-transparent text-sm font-bold text-brand-5 outline-none w-full" />
                            <span className="text-brand-2">~</span>
                            <input type="date" value={customEnd} onChange={e => setCustomEnd(e.target.value)} className="bg-transparent text-sm font-bold text-brand-5 outline-none w-full" />
                        </div>
                    )}
{/* 🏆 雙欄並排：綜合熱門常客榜 & 手搖飲金賞 */}
                    {(generalReport.length > 0 || drinkReport.length > 0) && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full mb-6">
                            {/* 常客榜卡片 */}
                            {generalReport.length > 0 && (
                                <div className="card-panel p-6 w-full bg-gradient-to-br from-white to-[#FDF3F3] border-[#E8D1D1]/50 shadow-sm">
                                    <h3 className="text-sm font-semibold text-brand-5 mb-4 flex items-center gap-2"><i className="fa-solid fa-crown text-yellow-500"></i> {reportTitle}熱門常客榜</h3>
                                    <div className="space-y-4">
                                        {generalReport.map((shop, index) => (
                                            <div key={shop.shopName} onClick={() => setSelectedShop(shop)} className="flex flex-col py-2 border-b border-brand-1/50 last:border-0 cursor-pointer hover:bg-white/60 px-2 rounded-lg transition-colors active:scale-[0.98]">
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className="text-sm font-bold text-brand-5"><span className="text-brand-3 mr-1">{['🥇', '🥈', '🥉'][index]}</span> {shop.shopName}</span>
                                                    <span className="text-xs font-semibold text-[#A56B5D]">${shop.total.toLocaleString()} <span className="text-[10px] text-brand-2 font-normal">({shop.count}次)</span></span>
                                                </div>
                                                <div className="text-[10px] text-brand-4 bg-white px-2 py-1 rounded w-fit border border-brand-1/50">最常點：{shop.topItem}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* 手搖飲金賞卡片 */}
                            {drinkReport.length > 0 && (
                                <div className="card-panel p-6 w-full bg-gradient-to-br from-white to-brand-1/20 border-brand-3/20 shadow-sm">
                                    <h3 className="text-sm font-semibold text-brand-5 mb-4 flex items-center gap-2"><i className="fa-solid fa-trophy text-[#A56B5D]"></i> {reportTitle}手搖飲金賞</h3>
                                    <div className="space-y-4">
                                        {drinkReport.map((shop, index) => (
                                           <div key={shop.shopName} onClick={() => setSelectedShop(shop)} className="flex flex-col py-2 border-b border-brand-1/50 last:border-0 cursor-pointer hover:bg-white/60 px-2 rounded-lg transition-colors active:scale-[0.98]">
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className="text-sm font-bold text-brand-5"><span className="text-brand-3 mr-1">{['🥇', '🥈', '🥉'][index]}</span> {shop.shopName}</span>
                                                    <span className="text-xs font-semibold text-[#A56B5D]">${shop.total.toLocaleString()} <span className="text-[10px] text-brand-2 font-normal">({shop.count}杯)</span></span>
                                                </div>

            };

            const handleImport = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (Array.isArray(importedData)) {
                            if (window.confirm('確定要匯入資料嗎？這會將備份資料全面同步上傳到雲端！')) {
                                await importRecords(importedData);
                            }
                        } else alert('檔案格式錯誤');
                    } catch (err) { alert('檔案解析失敗'); }
                };
                reader.readAsText(file);
            };

            const handleSettingChange = (key, value) => { updateSettings({ ...settings, [key]: value }); };

            const handleGoogleLogin = async () => {
                if (!fbAuth) return alert('Firebase 尚未初始化');

                            </div>

                            <div className="flex gap-3 w-full md:w-auto">
                                <button onClick={handleExport} className="flex-1 md:flex-none border border-brand-2/40 text-brand-5 font-medium py-2 px-5 rounded-lg hover:bg-brand-1/30 transition-colors text-xs font-bold"><i className="fa-solid fa-download mr-1.5 opacity-70"></i> 匯出備份</button>
                                <label className="flex-1 md:flex-none bg-brand-5 text-white font-medium py-2 px-5 rounded-lg hover:bg-brand-4 transition-colors text-center cursor-pointer text-xs font-bold shadow-sm"><i className="fa-solid fa-upload mr-1.5 opacity-70"></i> 匯入還原<input type="file" accept=".json" onChange={handleImport} className="hidden" /></label>
                            </div>
                        </div>
                        {/* --- 重看新手導覽按鈕 --- */}
                        <div className="card-panel p-6 flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
                            <div>
                                <h3 className="text-sm font-semibold text-brand-5 mb-1"><i className="fa-solid fa-map-location-dot mr-2 text-brand-3"></i>新手教學導覽</h3>
                                <p className="text-xs text-brand-4">想重新回味 ICEMemory 的特色功能嗎？</p>
                            </div>
                            <button onClick={replayTour} className="w-full md:w-auto px-5 py-2.5 rounded-lg text-xs font-bold text-brand-5 bg-brand-1/40 hover:bg-brand-1/70 transition-colors border border-brand-2/30 shadow-sm">
                                重新觀看導覽
                            </button>
                        </div>
                        <div className="text-center mt-4 border-t border-brand-1/50 pt-8">
                            <button onClick={() => { if (window.confirm('🚨 確定要清除所有紀錄嗎？(無法復原)')) importRecords([]); }} className="text-xs text-[#A56B5D] font-medium hover:underline py-2 px-4 transition-colors"><i className="fa-solid fa-triangle-exclamation mr-1.5"></i> 刪除所有系統紀錄</button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);


        // 1. 禁用右鍵選單
        document.addEventListener('contextmenu', function (e) {
            e.preventDefault();
        });

        // 2. 禁用常用的開發者工具與檢視原始碼快捷鍵
        document.addEventListener('keydown', function (e) {
            // 阻擋 F12
            if (e.key === 'F12') {
                e.preventDefault();
            }
            // 阻擋 Ctrl+Shift+I (Windows 開發者工具) / Cmd+Option+I (Mac)
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
            }
            // 阻擋 Ctrl+U (Windows 檢視原始碼) / Cmd+Option+U (Mac)
            if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u')) {
                e.preventDefault();
            }
        });
    </script>
</body>

</html>
