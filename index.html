                                <h3 className="text-sm font-semibold text-brand-5 mb-2 w-full text-left">{reportTitle}總花費</h3>
                                <p className="text-3xl font-bold text-brand-5 w-full text-left mb-6">${totalExpense.toLocaleString()}</p>

                                {Object.keys(catStats).length > 0 ? (
                                    <>
                                        <PieChart catStats={catStats} />

                                        {/* 新增：年度/自訂模式專屬的趨勢長條圖 */}
                                        {timeScale !== 'monthly' && (
                                            <TrendBarChart records={filteredRecords} scale={timeScale} />
                                        )}

                                        <div className="flex flex-col w-full gap-2 mt-6">
                                            {Object.entries(catStats).sort((a,b)=>b[1]-a[1]).map(([catId, amount], index) => (
                                                <div key={catId} className="flex items-center justify-between text-xs py-1.5 border-b border-brand-1/50 last:border-0">
                                                    <div className="flex items-center gap-2">
                                                        <span className="w-2.5 h-2.5 rounded-sm" style={{ backgroundColor: CHART_COLORS[index % CHART_COLORS.length] }}></span>
                                                        <span className="text-brand-5">{CATEGORIES.find(c => c.id === catId)?.name}</span>
                                                    </div>
                                                    <span className="font-semibold text-brand-4">${amount.toLocaleString()}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="py-12 text-brand-2 text-sm flex flex-col items-center gap-3"><i className="fa-solid fa-chart-pie text-3xl opacity-50"></i> 尚無資料</div>
                                )}
                            </div>

                            {/* 手搖飲戰報 (動態標題) */}
                            {drinkReport.length > 0 && (
                                <div className="card-panel p-6 w-full bg-gradient-to-br from-white to-brand-1/20 border-brand-3/20">
                                    <h3 className="text-sm font-semibold text-brand-5 mb-4 flex items-center gap-2">
                                        <i className="fa-solid fa-trophy text-[#A56B5D]"></i> {reportTitle}手搖飲金賞
                                    </h3>
                                    <div className="space-y-4">
                                        {drinkReport.map((shop, index) => (
                                            <div key={shop.shopName} className="flex flex-col py-2 border-b border-brand-1/50 last:border-0">
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className="text-sm font-bold text-brand-5"><span className="text-brand-3 mr-1">{['🥇', '🥈', '🥉'][index]}</span> {shop.shopName}</span>
                                                    <span className="text-xs font-semibold text-[#A56B5D]">${shop.total.toLocaleString()} <span className="text-[10px] text-brand-2 font-normal">({shop.count}杯)</span></span>
                                                </div>
                                                <div className="text-[10px] text-brand-4 bg-white px-2 py-1 rounded w-fit border border-brand-1/50">
                                                    必點：{shop.topItem}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {topItems.length > 0 && (
                                <div className="card-panel p-6 w-full hidden lg:block">
                                    <h3 className="text-sm font-semibold text-brand-5 mb-4">常客 Top 3</h3>
                                    {topItems.map(([name, count], index) => (
                                        <div key={name} className="flex justify-between items-center py-2.5 border-b border-brand-1/50 last:border-0">
                                            <span className="text-sm text-brand-4"><span className="w-5 inline-block text-brand-3 font-bold">{index+1}.</span> {name}</span>
                                            <span className="text-xs text-brand-3 font-semibold">{count} 次</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* 右欄：明細列表 (支援群組化) */}
                        <div className="w-full lg:w-[65%] card-panel p-6">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                                <h3 className="text-sm font-semibold text-brand-5 whitespace-nowrap"><i className="fa-solid fa-list-check mr-2 text-brand-3"></i>消費明細清單</h3>
                                <div className="relative w-full md:w-64 shrink-0">
                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-brand-2"><i className="fa-solid fa-magnifying-glass text-sm"></i></span>
                                    <input type="text" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="搜尋品項、代墊人..." className="w-full bg-brand-1/20 border border-brand-2/30 rounded-lg pl-9 pr-8 py-2 text-brand-5 focus:border-brand-3 focus:bg-white outline-none text-sm transition-colors" />
                                    {searchTerm && <button onClick={() => setSearchTerm('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-brand-2 hover:text-brand-5"><i className="fa-solid fa-xmark"></i></button>}
                                </div>
                            </div>

                            <div className="space-y-6">
                                {displayRecords.length === 0 && <p className="text-center text-brand-2 text-sm py-12">沒有找到符合的紀錄</p>}

                                {/* 渲染群組化明細 */}
                                {Object.entries(groupedRecords).map(([groupName, groupRecords]) => (
                                    <div key={groupName} className="mb-2">
                                        {/* 如果不是月度模式，顯示月份群組標題 */}
                                        {timeScale !== 'monthly' && (
                                            <h4 className="text-xs font-bold text-brand-4 mb-3 bg-brand-1/30 px-3 py-1.5 rounded-lg inline-block">
                                                {groupName} <span className="text-brand-3 ml-1">(共 ${groupRecords.reduce((s,r)=>s+r.price,0).toLocaleString()})</span>
                                            </h4>
                                        )}

                                        <div className="space-y-2">
                                            {groupRecords.map(record => {
                                                const cat = CATEGORIES.find(c => c.id === record.categoryId);
                                                const dateStr = new Date(record.date).toLocaleDateString('zh-TW', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
                                                return (
                                                    <div key={record.id} className="p-3 rounded-xl flex items-center justify-between group hover:bg-brand-1/30 transition-colors border border-transparent hover:border-brand-2/20">
                                                        <div className="flex items-center gap-4">
                                                            <div className="text-lg text-brand-3 w-10 h-10 shrink-0 rounded-lg bg-brand-1/40 flex items-center justify-center"><i className={cat?.icon}></i></div>
                                                            <div>
                                                                <RecordDisplayName record={record} />
                                                                <div className="text-xs text-brand-2 mt-1.5 flex flex-wrap gap-2 items-center">
                                                                    <span>{dateStr}</span>
                                                                    {record.payer && !record.isPaid && <span className="text-[#A56B5D] flex items-center gap-1"><i className="fa-solid fa-circle text-[6px]"></i>代墊: {record.payer}</span>}
                                                                    {record.payer && record.isPaid && <span className="text-brand-3 flex items-center gap-1"><i className="fa-solid fa-check text-[8px]"></i>已還: {record.payer}</span>}
                                                                    {record.memo && <span className="text-brand-4 flex items-center gap-1"><i className="fa-solid fa-quote-left text-[8px]"></i>{record.memo}</span>}
                                                                    {record.rating === 1 && <i className="fa-solid fa-thumbs-up text-brand-3 text-[10px]"></i>}
                                                                    {record.rating === -1 && <i className="fa-solid fa-thumbs-down text-[#A56B5D] text-[10px]"></i>}
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-1 ml-2">
                                                            <span className="font-bold text-brand-5 mr-2">${record.price.toLocaleString()}</span>
                                                            <button onClick={() => setEditingRecord(record)} className="text-brand-3 md:opacity-0 group-hover:opacity-100 transition-opacity p-2.5 hover:bg-brand-1/60 rounded-lg"><i className="fa-solid fa-pen"></i></button>
                                                            <button onClick={() => deleteRecord(record.id)} className="text-brand-2 md:opacity-0 group-hover:opacity-100 transition-opacity p-2.5 hover:text-[#A56B5D] hover:bg-[#FDF3F3] rounded-lg"><i className="fa-solid fa-trash-can"></i></button>
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* 呼叫編輯 Modal */}
                    {editingRecord && (
                        <EditModal
                            record={editingRecord}
                            onClose={() => setEditingRecord(null)}
                            onSave={(updatedRecord) => {
                                updateRecord(updatedRecord);
                                setEditingRecord(null);
                            }}
                        />
                    )}
                </div>
            );
        }

        // --- 4. 設定頁面 (Settings View) ---
        function SettingsView({ budget, setBudget, budgetType, setBudgetType, quota, setQuota, records, setRecords }) {
            const handleExport = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(records));
                const a = document.createElement('a');
                a.href = dataStr; a.download = "icememory_backup.json";
                document.body.appendChild(a); a.click(); a.remove();
            };
            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if(Array.isArray(importedData)) {
                            if(window.confirm('確定要匯入資料嗎？這會覆蓋目前的紀錄。')) { setRecords(importedData); alert('匯入成功！'); }
                        } else alert('檔案格式錯誤');
                    } catch (err) { alert('檔案解析失敗'); }
                };
                reader.readAsText(file);
            };

            return (
                <div className="flex flex-col items-center animate-fade-in pt-4">
                    <div className="w-full max-w-3xl flex flex-col gap-6">
                        <h2 className="text-2xl font-bold text-brand-5 hidden md:block tracking-tight mb-2">系統設定</h2>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="card-panel p-6 flex flex-col justify-center">
                                <label className="block text-sm font-semibold text-brand-4 mb-4">預算設定</label>

                                {/* 預算週期切換器 */}
                                <div className="flex bg-brand-1/30 p-1 rounded-lg mb-4">
                                    <button onClick={() => setBudgetType('daily')} className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-colors ${budgetType === 'daily' ? 'bg-white text-brand-5 shadow-sm' : 'text-brand-4 hover:text-brand-5'}`}>每日</button>
                                    <button onClick={() => setBudgetType('weekly')} className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-colors ${budgetType === 'weekly' ? 'bg-white text-brand-5 shadow-sm' : 'text-brand-4 hover:text-brand-5'}`}>每週</button>
                                    <button onClick={() => setBudgetType('monthly')} className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-colors ${budgetType === 'monthly' ? 'bg-white text-brand-5 shadow-sm' : 'text-brand-4 hover:text-brand-5'}`}>每月</button>
                                </div>

                                <div className="relative flex items-center">
                                    <span className="absolute left-4 text-brand-2 text-sm">NT$</span>
                                    <input type="number" value={budget} onChange={e => setBudget(Number(e.target.value))}
                                        className="w-full bg-brand-1/20 border border-brand-2/30 rounded-xl pl-12 pr-4 py-3 text-brand-5 font-bold focus:border-brand-3 focus:bg-white outline-none transition-colors" />
                                </div>
                            </div>

                            <div className="card-panel p-6 flex flex-col justify-center">
                                <label className="block text-sm font-semibold text-brand-4 mb-4">每週加料額度</label>
                                <div className="flex items-center gap-4">
                                    <input type="range" min="0" max="10" value={quota} onChange={e => setQuota(Number(e.target.value))} className="w-full accent-brand-5" />
                                    <span className="font-bold text-xl text-brand-5 w-8 text-center">{quota}</span><span className="text-xs text-brand-4">杯</span>
                                </div>
                            </div>
                        </div>

                        <div className="card-panel p-6 flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
                            <div>
                                <h3 className="text-sm font-semibold text-brand-5 mb-1">資料備份與還原</h3>
                                <p className="text-xs text-brand-4">匯出 JSON 格式以防資料遺失</p>
                            </div>
                            <div className="flex gap-3 w-full md:w-auto">
                                <button onClick={handleExport} className="flex-1 md:flex-none border border-brand-2/40 text-brand-5 font-medium py-2.5 px-5 rounded-lg hover:bg-brand-1/30 transition-colors text-sm"><i className="fa-solid fa-download mr-1.5 opacity-70"></i> 匯出備份</button>
                                <label className="flex-1 md:flex-none bg-brand-5 text-white font-medium py-2.5 px-5 rounded-lg hover:bg-brand-4 transition-colors text-center cursor-pointer text-sm shadow-sm"><i className="fa-solid fa-upload mr-1.5 opacity-70"></i> 匯入還原<input type="file" accept=".json" onChange={handleImport} className="hidden" /></label>
                            </div>
                        </div>

                        <div className="text-center mt-8">
                            <button onClick={()=>{ if(window.confirm('🚨 確定要清除所有紀錄嗎？(無法復原)')) setRecords([]); }} className="text-xs text-[#A56B5D] font-medium hover:underline py-2 px-4 transition-colors"><i className="fa-solid fa-triangle-exclamation mr-1.5"></i> 刪除所有系統紀錄</button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</body>
</html>
